<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="400" height="400" fill="none">

  <!-- Spectrum arcs -->
  <path d="M 10 58 Q 50 20 90 58" stroke="#ffffff" stroke-width="0.8" opacity="0.22" fill="none" stroke-linecap="round"></path>
  <path d="M 25 58 Q 50 32 75 58" stroke="#ffffff" stroke-width="1" opacity="0.28" fill="none" stroke-linecap="round"></path>
  <path d="M 40 58 Q 50 44 60 58" stroke="#ffffff" stroke-width="1.4" opacity="0.38" fill="none" stroke-linecap="round"></path>
  <path d="M 10 58 Q 30 38 50 58" stroke="#ffffff" stroke-width="0.8" opacity="0.22" fill="none" stroke-linecap="round"></path>
  <path d="M 50 58 Q 70 38 90 58" stroke="#ffffff" stroke-width="0.8" opacity="0.22" fill="none" stroke-linecap="round"></path>

  <!-- Horizontal segments -->
  <line x1="10" y1="58" x2="25" y2="58" stroke="#ffffff" stroke-width="1" opacity="0.36" stroke-linecap="round"></line>
  <line x1="25" y1="58" x2="40" y2="58" stroke="#ffffff" stroke-width="1" opacity="0.43" stroke-linecap="round"></line>
  <line x1="40" y1="58" x2="50" y2="58" stroke="#ffffff" stroke-width="1" opacity="0.51" stroke-linecap="round"></line>
  <line x1="50" y1="58" x2="60" y2="58" stroke="#ffffff" stroke-width="1" opacity="0.51" stroke-linecap="round"></line>
  <line x1="60" y1="58" x2="75" y2="58" stroke="#ffffff" stroke-width="1" opacity="0.43" stroke-linecap="round"></line>
  <line x1="75" y1="58" x2="90" y2="58" stroke="#ffffff" stroke-width="1" opacity="0.36" stroke-linecap="round"></line>

  <!-- Vertical lines from apex -->
  <line x1="50" y1="20" x2="50" y2="58" stroke="#ffffff" stroke-width="1.6" opacity="0.5" stroke-linecap="round"></line>
  <line x1="50" y1="20" x2="40" y2="58" stroke="#ffffff" stroke-width="1" opacity="0.3" stroke-linecap="round" stroke-dasharray="2 2"></line>
  <line x1="50" y1="20" x2="60" y2="58" stroke="#ffffff" stroke-width="1" opacity="0.3" stroke-linecap="round" stroke-dasharray="2 2"></line>

  <!-- Nodes -->
  <circle cx="10" cy="58" r="2.8" fill="#ffffff" opacity="0.6"></circle>
  <circle cx="25" cy="58" r="3.2" fill="#ffffff" opacity="0.7"></circle>
  <circle cx="40" cy="58" r="3.8" fill="#ffffff" opacity="0.85"></circle>
  <circle cx="50" cy="58" r="5.5" fill="#ffffff"></circle>
  <circle cx="60" cy="58" r="3.8" fill="#ffffff" opacity="0.85"></circle>
  <circle cx="75" cy="58" r="3.2" fill="#ffffff" opacity="0.7"></circle>
  <circle cx="90" cy="58" r="2.8" fill="#ffffff" opacity="0.6"></circle>
  <circle cx="50" cy="20" r="4.5" fill="#ffffff"></circle>

  <!-- OB label -->
  <text x="50" y="70" text-anchor="middle" dominant-baseline="middle" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-weight="600" font-size="6" fill="#ffffff" opacity="0.58" letter-spacing="1.4">OB</text>
</svg>
